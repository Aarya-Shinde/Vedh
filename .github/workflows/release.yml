name: Compile and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 requests lxml pyphen pygame-ce

      - name: Compile Standalone Updater
        run: |
          pyinstaller --name="updater" --console --onefile updater.py

      - name: Compile Main Application
        run: |
          pyinstaller --name="Vedh" --windowed --noconfirm --clean --paths="." --add-data "assets;assets" --add-data "themes;themes" app/main.py

      - name: Inject Updater into App Directory
        shell: powershell
        run: |
          Copy-Item -Path dist\updater.exe -Destination dist\Vedh\

      - name: Add WiX to PATH
        shell: powershell
        run: |
          $wixPath = Get-ChildItem -Path "C:\Program Files (x86)" -Filter "WiX Toolset*" | Select-Object -First 1
          if ($wixPath) {
              $binPath = Join-Path $wixPath.FullName "bin"
              Write-Output "Adding WiX bin directory to path: $binPath"
              echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
              Write-Error "WiX Toolset not found under C:\Program Files (x86)"
              exit 1
          }

      - name: Build MSI Installer
        run: |
          heat dir dist\Vedh -cg AppFilesGroup -dr INSTALLFOLDER -sreg -sfrag -srd -gg -out installer\AppFiles.wxs
          candle -out dist\ installer\Product.wxs installer\AppFiles.wxs
          light -out dist\Vedh_Windows_Setup.msi -b dist\Vedh dist\Product.wixobj dist\AppFiles.wixobj -ext WixUIExtension
        shell: cmd

      - name: Package Dist folder
        shell: powershell
        run: |
          Compress-Archive -Path dist\Vedh\* -DestinationPath dist\Vedh_Windows.zip

      - name: Generate SHA-256 Checksums
        shell: powershell
        run: |
          $zipHash = (Get-FileHash dist\Vedh_Windows.zip -Algorithm SHA256).Hash.ToLower()
          $msiHash = (Get-FileHash dist\Vedh_Windows_Setup.msi -Algorithm SHA256).Hash.ToLower()
          "$zipHash  Vedh_Windows.zip" | Out-File -FilePath dist\checksums.txt -Encoding ascii
          "$msiHash  Vedh_Windows_Setup.msi" | Out-File -FilePath dist\checksums.txt -Encoding ascii -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Vedh_Windows.zip
            dist/Vedh_Windows_Setup.msi
            dist/checksums.txt
          token: ${{ secrets.GITHUB_TOKEN }}

